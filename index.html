<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mehar Foji Trade - Professional</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#0f0f0f;color:white}

/* NAV */
nav{
background:#111;
padding:15px 25px;
display:flex;
justify-content:space-between;
align-items:center;
}
.logo{color:gold;font-weight:bold;font-size:20px}

.wallet{
background:#1a1a1a;
padding:8px 15px;
border-radius:20px;
cursor:pointer;
}

.container{
max-width:1100px;
margin:auto;
padding:30px;
}

.card{
background:#1a1a1a;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

h3{color:gold;margin-bottom:15px}

input,select{
width:100%;
padding:10px;
margin:8px 0;
border:none;
border-radius:5px;
}

button{
background:gold;
border:none;
padding:10px 20px;
border-radius:5px;
cursor:pointer;
font-weight:bold;
}

button:hover{background:#ffb300}

.history{
background:#111;
padding:10px;
border-radius:5px;
margin-top:10px;
max-height:150px;
overflow:auto;
}

.green{color:#00ff00}
.red{color:red}

footer{
text-align:center;
padding:20px;
color:#777;
margin-top:30px;
}
</style>
</head>

<body>

<nav>
<div class="logo">Mehar Foji Trade</div>
<div class="wallet">
Balance: <span id="balance">0</span> Coins
</div>
</nav>

<div class="container">

<!-- RECHARGE -->
<div class="card">
<h3>Recharge Coins</h3>

<select id="rechargeCoins" onchange="calculatePrice()">
<option value="10000">10000 Coins</option>
<option value="20000">20000 Coins</option>
<option value="30000">30000 Coins</option>
<option value="40000">40000 Coins</option>
<option value="50000">50000 Coins</option>
</select>

<p>Price: Rs <span id="price">3260</span></p>

<input type="file" id="paymentShot" accept="image/*">
<button onclick="recharge()">Submit Payment</button>

<div class="history" id="rechargeHistory"></div>
</div>

<!-- BET -->
<div class="card">
<h3>Place Bet</h3>

<select id="betAmount">
<option value="100">100 Coins</option>
<option value="500">500 Coins</option>
<option value="1000">1000 Coins</option>
<option value="5000">5000 Coins</option>
</select>

<button onclick="placeBet()">Place Bet</button>

<div class="history" id="betHistory"></div>
</div>

<!-- INVEST -->
<div class="card">
<h3>Investment</h3>

<select id="investAmount">
<option value="1000">1000 Coins</option>
<option value="5000">5000 Coins</option>
<option value="10000">10000 Coins</option>
<option value="20000">20000 Coins</option>
</select>

<select id="investPlan">
<option value="10">Short Term (10%)</option>
<option value="25">Medium Term (25%)</option>
<option value="50">Long Term (50%)</option>
</select>

<button onclick="invest()">Invest Now</button>

<div class="history" id="investHistory"></div>
</div>

<!-- WITHDRAW -->
<div class="card">
<h3>Withdraw Coins</h3>

<input type="number" id="withdrawAmount" placeholder="Enter coins to withdraw">
<input type="text" id="withdrawAccount" placeholder="Enter Easypaisa / JazzCash Number">

<button onclick="withdraw()">Request Withdraw</button>

<div class="history" id="withdrawHistory"></div>
</div>

</div>

<footer>© 2026 Mehar Foji Trade - Professional System</footer>

<script>

let balance = 0;

/* PRICE CALCULATION */
function calculatePrice(){
let coins = document.getElementById("rechargeCoins").value;
let rate = 3260/10000;
document.getElementById("price").innerText =
Math.floor(coins*rate);
}

/* RECHARGE */
function recharge(){
let file = document.getElementById("paymentShot").files[0];
if(!file){alert("Upload Screenshot");return;}

let coins = parseInt(document.getElementById("rechargeCoins").value);
balance += coins;

document.getElementById("balance").innerText = balance;

document.getElementById("rechargeHistory").innerHTML +=
`<p class="green">Recharge ${coins} Coins Successful</p>`;
}

/* BET */
function placeBet(){
let bet = parseInt(document.getElementById("betAmount").value);

if(bet>balance){
alert("Not enough coins");
return;
}

balance -= bet;

let win = Math.random() > 0.5;

if(win){
let profit = bet;
balance += bet*2;
document.getElementById("betHistory").innerHTML +=
`<p class="green">Won ${profit} Coins</p>`;
}else{
document.getElementById("betHistory").innerHTML +=
`<p class="red">Lost ${bet} Coins</p>`;
}

document.getElementById("balance").innerText = balance;
}

/* INVEST */
function invest(){
let amount = parseInt(document.getElementById("investAmount").value);
let percent = parseInt(document.getElementById("investPlan").value);

if(amount>balance){
alert("Not enough coins");
return;
}

balance -= amount;

let profit = Math.floor(amount*percent/100);

balance += amount + profit;

document.getElementById("balance").innerText = balance;

document.getElementById("investHistory").innerHTML +=
`<p class="green">Invested ${amount} → Profit ${profit}</p>`;
}

/* WITHDRAW */
function withdraw(){
let amount = parseInt(document.getElementById("withdrawAmount").value);
let account = document.getElementById("withdrawAccount").value;

if(amount>balance){
alert("Not enough coins");
return;
}

if(account===""){
alert("Enter account number");
return;
}

balance -= amount;
document.getElementById("balance").innerText = balance;

document.getElementById("withdrawHistory").innerHTML +=
`<p class="red">Withdraw Request ${amount} Coins → ${account}</p>`;
}

</script>

</body>
    </html>
