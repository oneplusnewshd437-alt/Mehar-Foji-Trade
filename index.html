</style>

<script>
// LOGIN SYSTEM
function login(){
let m=document.getElementById("mobile").value;
let p=document.getElementById("pass").value;

if(!localStorage.getItem("m")){
localStorage.setItem("m",m);
localStorage.setItem("p",p);
alert("Account Created");
location.reload();
}else{
if(m==localStorage.getItem("m") && p==localStorage.getItem("p")){
document.getElementById("loginPage").style.display="none";
}else{
alert("Wrong Details");
}
}
}

function resetPass(){
let m=prompt("Enter Mobile");
if(m==localStorage.getItem("m")){
let np=prompt("New Password");
localStorage.setItem("p",np);
alert("Reset Done");
}
}

window.onload=function(){
if(localStorage.getItem("m")){
document.getElementById("loginPage").style.display="none";
}
}

// ORIGINAL JS SAME
function invest(plan){
window.open("https://wa.me/923491441853?text="+plan);
}

function claimReward(){
var last=localStorage.getItem("lastClaim");
var now=new Date().getTime();
if(!last || now-last>86400000){
localStorage.setItem("lastClaim",now);
var coins=localStorage.getItem("coins")||0;
coins=parseInt(coins)+10;
localStorage.setItem("coins",coins);
document.getElementById("coins").innerHTML=coins;
alert("10 Coins Added");
}else{
alert("Already claimed");
}
}

function loadCoins(){
document.getElementById("coins").innerHTML=localStorage.getItem("coins")||0;
}

function calcProfit(){
var amt=document.getElementById("amount").value;
var profit=amt*0.25;
var total=parseInt(amt)+profit;
document.getElementById("result").innerHTML="Profit: "+profit+" | Total: "+total;
}

window.onload = function(){
loadCoins();
if(localStorage.getItem("m")){
document.getElementById("loginPage").style.display="none";
}
}
</script>
