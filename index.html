<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F JIND Trade</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{background:#111;color:white;min-height:100vh;}
.header{width:100%;border-bottom:3px solid gold;background:black;text-align:center;}
.header img{max-width:100%;height:auto;display:block;margin:0 auto;}
.balance-box{text-align:center;padding:12px;background:#111;font-size:15px;border-bottom:1px solid #222;}
.balance-box span{color:#00ff88;font-weight:bold;font-size:16px;}
.container{max-width:1000px;margin:auto;padding:25px 15px 150px;}
.card{background:#161616;padding:20px;border-radius:15px;box-shadow:0 10px 30px rgba(0,0,0,0.7);margin-bottom:20px;border:1px solid #222;}
.card h2{color:gold;margin-bottom:15px;text-align:center;}
input,select{width:100%;padding:12px;margin:10px 0;border:none;border-radius:8px;background:#222;color:white;}
button{width:100%;padding:12px;border:none;border-radius:8px;background:gold;color:black;font-weight:bold;cursor:pointer;margin-top:10px;}
button:hover{background:orange;}
.history{background:#111;padding:10px;border-radius:8px;font-size:13px;max-height:120px;overflow:auto;margin-top:10px;}
.green{color:#00ff88;} .red{color:#ff4d4d;} .orange{color:orange;}
.contact{text-align:center;padding:15px;background:#111;color:#00ff88;font-size:15px;}
footer{text-align:center;padding:15px;background:black;color:#888;}
.whatsapp{position:fixed;right:15px;bottom:80px;background:#25D366;color:white;padding:12px 15px;border-radius:50px;font-size:14px;text-decoration:none;box-shadow:0 5px 15px rgba(0,0,0,0.5);}

/* GAME */
.game-area{position:relative;background:url('F jind.jpg') no-repeat center/cover;height:400px;border-radius:15px;margin-top:15px;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.cards{display:flex;justify-content:center;gap:15px;position:relative;margin-top:10px;}
.card3d{width:90px;height:130px;background:#222;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:bold;box-shadow:0 10px 20px rgba(0,0,0,0.8);background-size:cover;background-position:center;cursor:pointer;}
.bet-amount{position:absolute;top:10px;left:50%;transform:translateX(-50%);color:#00ff88;font-weight:bold;font-size:18px;}
.timer{text-align:center;font-size:18px;color:#00ff88;margin-top:5px;}
.result{text-align:center;margin-top:10px;font-weight:bold;font-size:16px;}
.simulation{font-size:12px;color:#aaa;margin-top:10px;height:50px;overflow:hidden;}
.winning-slider{position:absolute;bottom:0;left:0;width:100%;height:25px;background:red;color:white;font-size:12px;display:flex;flex-direction:column;justify-content:flex-end;padding:2px;overflow:hidden;}

/* ADMIN PANEL */
#adminPanel{display:none;background:#222;padding:20px;border-radius:12px;margin-top:20px;}
#adminPanel h2{color:gold;text-align:center;margin-bottom:10px;}
.request{background:#111;padding:8px;margin:5px 0;border-radius:8px;display:flex;justify-content:space-between;align-items:center;}
.request span{font-size:14px;color:#00ff88;}
.request button{padding:4px 8px;margin-left:5px;border:none;border-radius:5px;cursor:pointer;}
.request button.approve{background:green;color:white;}
.request button.reject{background:red;color:white;}
</style>
</head>
<body>

<div class="header">
<img src="./Alig.jpg" alt="Header Banner">
</div>

<div class="balance-box">
Balance: <span id="balance">0</span> Coins
</div>

<div class="container">

<!-- RECHARGE -->
<div class="card">
<h2>Recharge</h2>
<p style="color:#00ff88;">Rate: 1000 Coins = 3200 Rs</p>
<p style="color:#00ff88;">EasyPaisa: 03220751486</p>
<input type="number" id="rechargeAmount" placeholder="Enter Coins (Min 1000)">
<button onclick="recharge()">Submit Recharge</button>
<div class="history" id="rechargeHistory"></div>
</div>

<!-- INVESTMENT -->
<div class="card">
<h2>Investment Plans</h2>
<select id="investAmount">
<option value="1000">1000</option>
<option value="5000">5000</option>
<option value="10000">10000</option>
<option value="20000">20000</option>
<option value="50000">50000</option>
</select>
<select id="investPlan">
<option value="10">10% Return</option>
<option value="25">25% Return</option>
<option value="50">50% Return</option>
</select>
<button onclick="invest()">Invest Now</button>
<div class="history" id="investHistory"></div>
</div>

<!-- GAME -->
<div class="card">
<h2>Teen Patti Game</h2>
<input type="number" id="betAmount" placeholder="Bet 100 - 5000">
<div class="game-area" id="gameArea">
<div class="bet-amount" id="betDisplay">Your Total Bet: 0 Coins</div>
<div class="cards">
<div class="card3d" id="card1" onclick="placeBet(1)">?</div>
<div class="card3d" id="card2" onclick="placeBet(2)">?</div>
<div class="card3d" id="card3" onclick="placeBet(3)">?</div>
</div>
<div class="timer" id="timer">Timer: 15</div>
<div class="result" id="gameResult"></div>
<div class="winning-slider" id="winningSlider"></div>
<div class="simulation" id="simDisplay"></div>
</div>
<button onclick="startGame()">Start Game</button>
</div>

<!-- WITHDRAW -->
<div class="card">
<h2>Withdraw</h2>
<input type="number" id="withdrawAmount" placeholder="Enter Coins">
<input type="text" id="withdrawAccount" placeholder="Easypaisa / JazzCash Number">
<button onclick="withdraw()">Withdraw Now</button>
<div class="history" id="withdrawHistory"></div>
</div>

<!-- ADMIN PANEL -->
<div class="card" id="adminPanel">
<h2>Admin Panel</h2>
<div id="rechargeRequests"></div>
</div>

</div>

<div class="contact">
Contact Us: <b>03491441853</b>
</div>

<footer>
© 2026 F JIND Trade | Professional Investment & Gaming Platform
</footer>

<script>
let balance = parseInt(localStorage.getItem('balance')) || 0;
updateBalance();
let cardBets=[0,0,0];
const cardImages=["Aaa.jpg","Alll.jpg","Ammm.jpg"];
let rechargeRequests = JSON.parse(localStorage.getItem('rechargeRequests')) || [];

// Update balance
function updateBalance(){
  document.getElementById("balance").innerText = balance;
  localStorage.setItem('balance', balance);
}

// Recharge
function recharge(){
  let coins = parseInt(document.getElementById("rechargeAmount").value);
  if(!coins || coins < 1000){alert("Minimum 1000 Coins"); return;}
  rechargeRequests.push({id:Date.now(), coins});
  localStorage.setItem('rechargeRequests', JSON.stringify(rechargeRequests));
  displayRequests();
  alert("Recharge request sent to admin panel for approval!");
}

// Display requests in admin panel
function displayRequests(){
  let container = document.getElementById('rechargeRequests');
  container.innerHTML="";
  rechargeRequests.forEach(req=>{
    let div = document.createElement('div');
    div.className="request";
    div.innerHTML=`<span>${req.coins} Coins</span>
      <div>
        <button class="approve" onclick="approveRequest(${req.id})">Approve</button>
        <button class="reject" onclick="rejectRequest(${req.id})">Reject</button>
      </div>`;
    container.appendChild(div);
  });
}
displayRequests();

function approveRequest(id){
  let idx = rechargeRequests.findIndex(r=>r.id===id);
  if(idx>-1){
    balance += rechargeRequests[idx].coins;
    rechargeRequests.splice(idx,1);
    localStorage.setItem('balance', balance);
    localStorage.setItem('rechargeRequests', JSON.stringify(rechargeRequests));
    updateBalance();
    displayRequests();
  }
}
function rejectRequest(id){
  rechargeRequests = rechargeRequests.filter(r=>r.id!==id);
  localStorage.setItem('rechargeRequests', JSON.stringify(rechargeRequests));
  displayRequests();
}

// Investment
function invest(){
  let amount=parseInt(document.getElementById("investAmount").value);
  let percent=parseInt(document.getElementById("investPlan").value);
  if(amount>balance){alert("Not enough coins");return;}
  balance-=amount;
  let profit=Math.floor(amount*percent/100);
  balance+=amount+profit;
  updateBalance();
  document.getElementById("investHistory").innerHTML+=
    "<p class='green'>Invest "+amount+" → Profit "+profit+"</p>";
}

// Game
function updateTotalBet(){
  let totalBet=cardBets.reduce((a,b)=>a+b,0);
  document.getElementById("betDisplay").innerText="Your Total Bet: "+totalBet+" Coins";
}
function placeBet(cardNum){
  let maxBet=balance-cardBets.reduce((a,b)=>a+b,0);
  if(maxBet<=0){alert("No more coins available"); return;}
  let bet=parseInt(prompt("Enter coins to bet on this card (max "+maxBet+")"));
  if(!bet || bet<1 || bet>maxBet){alert("Invalid bet"); return;}
  cardBets[cardNum-1]+=bet;
  updateTotalBet();
}
function resetCards(){for(let i=1;i<=3;i++){let c=document.getElementById("card"+(i+1));c.innerText="?";c.style.backgroundImage="";} document.getElementById("winningSlider").innerHTML="";}
function startGame(){
  let totalBet=cardBets.reduce((a,b)=>a+b,0);
  if(totalBet==0){alert("Place at least one bet"); return;}
  balance-=totalBet;
  updateBalance();
  resetCards();
  document.getElementById("timer").innerText="Timer: 15";
  document.getElementById("gameResult").innerText="";
  let timeLeft=15;
  let timer=setInterval(()=>{
    timeLeft--;
    document.getElementById("timer").innerText="Timer: "+timeLeft;
    if(timeLeft<=0){
      clearInterval(timer);
      revealCards();
    }
  },1000);
}
function revealCards(){
  let totalWin=0;
  const slider=document.getElementById("winningSlider");
  for(let i=0;i<3;i++){
    let c=document.getElementById("card"+(i+1));
    c.style.backgroundImage="url('"+cardImages[i]+"')";
    c.innerText="";
    if(cardBets[i]>0){
      let win=Math.random()>0.5 ? cardBets[i]*2 : 0;
      totalWin+=win;
      if(win>0){
        let div=document.createElement("div");
        div.innerText="YS won "+win+" Coins";
        slider.appendChild(div);
      }
    }
  }
  if(totalWin>0){
    balance+=totalWin;
    document.getElementById("gameResult").innerHTML="<span class='green'>You Won "+totalWin+" Coins</span>";
  }else{
    document.getElementById("gameResult").innerHTML="<span class='red'>You Lost "+cardBets.reduce((a,b)=>a+b,0)+" Coins</span>";
  }
  cardBets=[0,0,0];
  updateTotalBet();
  updateBalance();
}

// Withdraw
function withdraw(){
  let amount=parseInt(document.getElementById("withdrawAmount").value);
  let acc=document.getElementById("withdrawAccount").value;
  if(amount>balance){alert("Not enough coins");return;}
  if(acc==""){alert("Enter account");return;}
  balance-=amount; updateBalance();
  document.getElementById("withdrawHistory").innerHTML+=
    "<p class='red'>Withdraw "+amount+" → "+acc+"</p>";
}

// Simulated game
const simNames=["User123","PlayerX","AceGamer","CardKing","Lucky77"];
function simulateGame(){
  let simText="";
  for(let i=0;i<5;i++){
    let result=Math.random()>0.5?"won":"lost";
    let coins=Math.floor(Math.random()*500+100);
    let user=simNames[Math.floor(Math.random()*simNames.length)];
    simText+=user+" "+result+" "+coins+" Coins<br>";
  }
  document.getElementById("simDisplay").innerHTML=simText;
  setTimeout(simulateGame,3000);
}
simulateGame();

// Admin panel password prompt
let adminPass = "1234";
let isAdmin = prompt("Enter Admin Password (1234) or cancel:")===adminPass;
if(isAdmin){document.getElementById("adminPanel").style.display="block";}
</script>
</body>
  </html>
