<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MR FOJI Investment</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,Arial;}
body, html{
    height:100%;
    overflow-x:hidden;
    color:white;
    background-image:url('investment.jpg');
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;
}
@media(max-width:768px){body{background-attachment:scroll;}}

/* LOGIN CARD */
#loginBox{
    position:fixed;
    top:0;left:0;width:100%;height:100vh;
    background:url("login 888.jpg") center/cover no-repeat;
    display:flex;justify-content:center;align-items:flex-start;
    padding-top:250px;z-index:9999;
}
.login-box{
    background:rgba(0,0,0,0.85);
    padding:25px;border-radius:15px;width:300px;text-align:center;
    border:2px solid #22c55e;
    box-shadow:0 0 15px #22c55e,0 8px 20px rgba(0,0,0,0.6);
}
.login-box h2{color:#22c55e;margin-bottom:20px;}
.login-box input{width:100%;padding:10px;margin:10px 0;border:none;border-radius:6px;}
.login-box .btn-row{display:flex;gap:10px;}
.login-box button{flex:1;padding:10px;border:none;color:white;border-radius:6px;cursor:pointer;}
.login-btn{background:#22c55e;}
.reset-btn{background:red;}

/* NAV */
nav{
    display:flex;justify-content:space-between;align-items:center;
    padding:15px 30px;background:#111827;margin:10px;border-radius:10px;
    box-shadow:0 10px 30px rgba(0,0,0,0.5),0 0 15px #22c55e inset;
}
nav h1{color:#22c55e;font-size:28px;}
.coins{font-weight:bold;font-size:18px;}
.coins img{width:25px;height:25px;margin-right:5px;vertical-align:middle;border-radius:50%;}

/* NEWS */
.news{background:red;padding:10px;overflow:hidden;white-space:nowrap;margin:10px;border-radius:8px;}
.news span{display:inline-block;padding-left:100%;animation:slide 35s linear infinite;}
@keyframes slide {0%{transform:translateX(0);}100%{transform:translateX(-100%);}}

/* HERO */
.hero{text-align:center;padding:40px;}
.hero h2{font-size:38px;}
.hero p{color:#9ca3af;}

/* TASK */
.task{
    background:#111827;margin:20px auto;padding:20px;border-radius:12px;
    text-align:center;width:90%;max-width:400px;border:1px solid #22c55e;
}
.task button{margin-top:10px;padding:10px 25px;background:#22c55e;border:none;color:white;border-radius:6px;}

/* STATS */
.stats{display:flex;justify-content:center;padding:20px;}
.stat{background:#111827;padding:20px;border-radius:12px;border:1px solid #22c55e;}
.stat h3{color:#22c55e;}

/* EVENT */
.event{text-align:center;padding:30px;}
.event-img{width:100%;max-width:350px;border-radius:15px;}
.event-button{display:inline-block;background:#22c55e;color:white;padding:12px 25px;border-radius:8px;text-decoration:none;margin-top:10px;}

/* PLANS */
.plans{display:flex;flex-wrap:wrap;justify-content:center;gap:25px;padding:20px;}
.plan{padding:20px;width:260px;border-radius:15px;}
.plan.basic{background:#1e3c72;}
.plan.silver{background:#c0c0c0;color:black;}
.plan.gold{background:#ffd700;color:black;}
.plan.vip{background:#ff4d4d;}
.plan button{padding:10px;background:#22c55e;border:none;color:white;border-radius:6px;}

/* BOX */
.box{background:#111827;padding:25px;border-radius:10px;max-width:400px;margin:20px auto;}
.box input{width:100%;padding:12px;margin:10px 0;border-radius:6px;border:none;}
.box button{width:100%;padding:12px;background:#25D366;border:none;border-radius:8px;color:white;}

/* FOOTER */
footer{background:#020617;padding:20px;text-align:center;color:#aaa;}
.whatsapp{position:fixed;bottom:20px;right:20px;background:#25D366;padding:14px;border-radius:50px;color:white;}
</style>

<script>
// LOGIN
function loginUser(){
    var m=document.getElementById("mobile").value;
    var p=document.getElementById("pass").value;
    if(!m||!p){alert("Fill all fields");return;}

    if(!localStorage.getItem("userMobile")){
        localStorage.setItem("userMobile",m);
        localStorage.setItem("userPass",p);
        localStorage.setItem("coins",60);
        alert("Account Created ✅");
        location.reload();
    }else{
        if(m===localStorage.getItem("userMobile") && p===localStorage.getItem("userPass")){
            document.getElementById("loginBox").style.display="none";
        }else{alert("Wrong Details ❌");}
    }
}

// RESET
function resetPassword(){
    var m=prompt("Enter Mobile Number");
    if(m===localStorage.getItem("userMobile")){
        var np=prompt("Enter New Password");
        localStorage.setItem("userPass",np);
        alert("Password Reset ✅");
    }else{alert("Number Not Found ❌");}
}

// COINS
function loadCoins(){
    var mobile = localStorage.getItem("userMobile");
    var coins;

    if(mobile === "03175482087"){ coins = 73183; }
    else if(mobile === "03491441853"){ coins = 286160; }
    else if(mobile === "03291928299"){ coins = 1328; }
    else if(mobile === "03001234567"){ coins = 30000; }
    else{ coins = parseInt(localStorage.getItem("coins") || 0); }

    document.getElementById("coins").innerHTML =
    '<img src="Coine1.jpg"> ' + coins;

    localStorage.setItem("coins", coins);
}

// DAILY
function claimReward(){
    var last = localStorage.getItem("lastClaim");
    var now = new Date().getTime();
    if(!last || now - last > 86400000){
        localStorage.setItem("lastClaim", now);
        var coins = parseInt(localStorage.getItem("coins")||0)+10;
        localStorage.setItem("coins", coins);
        alert("10 Coins Added ✅");
        loadCoins();
    }else{alert("Already claimed ❌");}
}

// LIVE USERS
function simulateOnlineUsers(){
    setInterval(()=>{
        document.getElementById("onlineUsers").innerText =
        Math.floor(Math.random()*300+150)+" Users Online";
    },3000);
}

window.onload=function(){
    loadCoins();
    simulateOnlineUsers();
};
</script>
</head>

<body>

<div id="loginBox">
<div class="login-box">
<h2>LOGIN REGISTERED ID</h2>
<input id="mobile" placeholder="Mobile Number">
<input id="pass" type="password" placeholder="Password">
<div class="btn-row">
<button class="login-btn" onclick="loginUser()">Login</button>
<button class="reset-btn" onclick="resetPassword()">Reset Password</button>
</div>
</div>
</div>

<nav>
<h1>MR FOJI</h1>
<div class="coins" id="coins">0</div>
</nav>

<div class="news"><span id="liveTicker">Ali Invested 108000 PKR | M Hussain Invested 27500 PKR</span></div>

<div class="hero">
<h2>Professional Investment Platform</h2>
<p>Fast • Secure • Professional</p>
</div>

<div class="task">
<h3>Daily Login Reward</h3>
<button onclick="claimReward()">Claim Reward</button>
</div>

<div class="stats">
<div class="stat"><h3 id="onlineUsers">0</h3><p>Online Users</p></div>
</div>

<footer>© MR FOJI Investment</footer>
<a href="#" class="whatsapp">WhatsApp</a>

</body>
    </html>
