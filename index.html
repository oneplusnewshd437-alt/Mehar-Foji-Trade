<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MR FOJI Investment</title><style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,Arial;}

body{background:#020617;color:white;}

/* APP STYLE CONTAINER */
.app{max-width:420px;margin:auto;background:#0f172a;min-height:100vh;box-shadow:0 0 20px rgba(0,0,0,0.7);}

/* BANNER FULL */
.top-banner img{width:100%;height:auto;object-fit:contain;}

/* NAV */
nav{display:flex;justify-content:space-between;padding:15px;background:#020617;border-bottom:1px solid #1f2937;}
nav h1{color:#22c55e;font-size:18px;}

/* HERO */
.hero{text-align:center;padding:20px;}

/* DAILY TASK */
.task{
background:#111827;
margin:15px;
padding:20px;
border-radius:10px;
text-align:center;
border:1px solid #22c55e;
}
.task button{
margin-top:10px;
padding:10px 20px;
background:#22c55e;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

/* STATS */
.stats{display:flex;justify-content:space-around;padding:15px;}
.stat{text-align:center;}
.stat h3{color:#22c55e;}

/* EVENT */
.event{text-align:center;padding:20px;}
.event-img{width:200px;height:200px;object-fit:cover;border-radius:10px;}

/* PLANS */
.plans{padding:15px;}
.plan{
background:#111827;
padding:15px;
margin-bottom:15px;
border-radius:10px;
}
.plan.vip{border:2px solid #22c55e;}
.plan button{margin-top:10px;padding:10px;background:#22c55e;border:none;color:white;border-radius:5px;}

/* FOOTER NAV */
.footer-nav{
position:fixed;
bottom:0;
width:100%;
max-width:420px;
display:flex;
justify-content:space-around;
background:#020617;
padding:10px;
border-top:1px solid #1f2937;
}

</style><script>
function invest(plan){
window.open("https://wa.me/923491441853?text="+plan);
}

/* DAILY TASK SYSTEM */
function claimReward(){
var last=localStorage.getItem("lastClaim");
var now=new Date().getTime();

if(!last || now - last > 86400000){
localStorage.setItem("lastClaim",now);
var coins=localStorage.getItem("coins")||0;
coins=parseInt(coins)+10;
localStorage.setItem("coins",coins);
document.getElementById("coins").innerHTML=coins;
alert("10 Coins Added ✅");
}else{
alert("You already claimed reward today ❌");
}
}

function loadCoins(){
var coins=localStorage.getItem("coins")||0;
document.getElementById("coins").innerHTML=coins;
}

/* AUTO PROFIT */
var profit=210000;
setInterval(()=>{
profit+=Math.floor(Math.random()*200);
document.getElementById("profit").innerHTML=profit+" PKR";
},3000);

window.onload=loadCoins;
</script></head><body><div class="app"><div class="top-banner">
<img src="Ali888.jpg">
</div><nav>
<h1>MR FOJI</h1>
<h1>Coins: <span id="coins">0</span></h1>
</nav><div class="hero">
<h3>Daily Reward System</h3>
</div><div class="task">
<h3>Daily Login Reward</h3>
<p>Get 10 Coins every 24 hours</p>
<button onclick="claimReward()">Claim Reward</button>
</div><div class="stats">
<div class="stat"><h3 id="profit">210000</h3><p>Profit</p></div>
</div><div class="event">
<h3>Event</h3>
<img src="F Crown.png" class="event-img">
<p>500 RS Entry</p>
</div><div class="plans"><div class="plan">
<h3>Basic</h3>
<p>8000 → 12000</p>
<button onclick="invest('Basic')">Invest</button>
</div><div class="plan">
<h3>Silver</h3>
<p>16000 → 24000</p>
<button onclick="invest('Silver')">Invest</button>
</div><div class="plan">
<h3>Gold</h3>
<p>32000 → 50000</p>
<button onclick="invest('Gold')">Invest</button>
</div><div class="plan vip">
<h3>VIP 🔥</h3>
<p>50000 → 85000</p>
<button onclick="invest('VIP')">Invest</button>
</div></div><div class="footer-nav">
<div>Home</div>
<div>Plans</div>
<div>Profile</div>
</div></div></body>
</html>
