<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F JIND Trade</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{background:linear-gradient(135deg,#000,#111,#1c1c1c);color:white;min-height:100vh;}
.header{width:100%;border-bottom:3px solid gold;background:black;text-align:center;}
.header img{max-width:100%;height:auto;display:block;margin:0 auto;}
.balance-box{text-align:center;padding:12px;background:#111;font-size:15px;border-bottom:1px solid #222;position:relative;}
.balance-box span{color:#00ff88;font-weight:bold;font-size:16px;}
.winning-ticker{position:absolute;bottom:-25px;width:100%;text-align:center;color:red;font-size:14px;font-weight:bold;overflow:hidden;height:20px;white-space:nowrap;animation:scroll 10s linear infinite;}
@keyframes scroll{0%{transform:translateX(100%);}100%{transform:translateX(-100%);}}
.container{max-width:1000px;margin:auto;padding:25px 15px 100px;}
.card{background:#161616;padding:20px;border-radius:15px;box-shadow:0 10px 30px rgba(0,0,0,0.7);margin-bottom:20px;border:1px solid #222;}
.card h2{color:gold;margin-bottom:15px;text-align:center;}
input,select{width:100%;padding:12px;margin:10px 0;border:none;border-radius:8px;background:#222;color:white;}
button{width:100%;padding:12px;border:none;border-radius:8px;background:gold;color:black;font-weight:bold;cursor:pointer;margin-top:10px;}
button:hover{background:orange;}
.history{background:#111;padding:10px;border-radius:8px;font-size:13px;max-height:120px;overflow:auto;margin-top:10px;}
.green{color:#00ff88;} .red{color:#ff4d4d;} .orange{color:orange;}
.contact{text-align:center;padding:15px;background:#111;color:#00ff88;font-size:15px;}
footer{text-align:center;padding:15px;background:black;color:#888;}
.whatsapp{position:fixed;right:15px;bottom:80px;background:#25D366;color:white;padding:12px 15px;border-radius:50px;font-size:14px;text-decoration:none;box-shadow:0 5px 15px rgba(0,0,0,0.5);}
.game-area{position:relative;background:url('F jind.jpg') no-repeat center/cover;height:400px;border-radius:15px;margin-top:15px;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.cards{display:flex;justify-content:center;gap:15px;position:relative;margin-top:10px;}
.card3d{width:90px;height:130px;background:#222;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:bold;box-shadow:0 10px 20px rgba(0,0,0,0.8);background-size:cover;background-position:center;}
.bet-amount{position:absolute;top:10px;left:50%;transform:translateX(-50%);color:#00ff88;font-weight:bold;font-size:18px;}
.timer{text-align:center;font-size:18px;color:#00ff88;margin-top:5px;}
.result{text-align:center;margin-top:10px;font-weight:bold;font-size:16px;}
.simulation{font-size:12px;color:#aaa;margin-top:10px;height:50px;overflow:hidden;}

/* Wingo */
.wingo-area{position:relative;background:url('Wingo.jpg') no-repeat center/cover;min-height:300px;border-radius:15px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:20px;}
.wingo-board{display:grid;grid-template-columns:repeat(5,40px);grid-gap:10px;margin-top:15px;justify-content:center;}
.wingo-cell{width:40px;height:40px;background:#222;display:flex;align-items:center;justify-content:center;border-radius:50%;font-weight:bold;cursor:pointer;font-size:14px;box-shadow:0 3px 8px rgba(0,0,0,0.7);transition:0.3s;}
.wingo-cell.selected{border:2px solid #00ff88;}
.wingo-cell.matched{border:2px solid gold;animation:blink 0.5s infinite alternate;}
@keyframes blink{0%{border-color:gold;}100%{border-color:#ff0;}}
</style>
</head>
<body>
<div class="header"><img src="./Alig.jpg" alt="Header Banner"></div>

<div class="balance-box">
Balance: <span id="balance">0</span> Coins
<div class="winning-ticker" id="winningTicker"></div>
</div>

<div class="container">

<!-- TEEN PATTI -->
<div class="card">
<h2>Teen Patti Game</h2>
<input type="number" id="betAmount" placeholder="Bet 100 - 5000">
<div class="game-area" id="gameArea">
<div class="bet-amount" id="betDisplay"></div>
<div class="cards">
<div class="card3d" id="card1">?</div>
<div class="card3d" id="card2">?</div>
<div class="card3d" id="card3">?</div>
</div>
<div class="timer" id="timer">Timer: 15</div>
<div class="result" id="gameResult"></div>
<div class="simulation" id="simDisplay"></div>
</div>
<button onclick="startGame()">Start Game</button>
</div>

<!-- WINGO -->
<div class="card">
<h2>Wingo Game</h2>
<input type="number" id="wingoBet" placeholder="Bet 100 - 5000">
<div class="wingo-area" id="wingoArea">
<div class="bet-amount" id="wingoBetDisplay"></div>
<div class="result" id="wingoResult"></div>
<div class="wingo-board" id="wingoBoard"></div>
<div class="timer" id="wingoTimerDisplay">Timer: 15</div>
</div>
<button onclick="playWingo()">Play Wingo</button>
</div>

<!-- RECHARGE -->
<div class="card">
<h2>Recharge</h2>
<p style="color:#00ff88;">Rate: 1000 Coins = 3200 Rs</p>
<p style="color:#00ff88;">EasyPaisa: 03220751486</p>
<input type="number" id="rechargeAmount" placeholder="Enter Coins (Min 1000)">
<button onclick="recharge()">Submit Recharge</button>
<div class="history" id="rechargeHistory"></div>
</div>

<!-- WITHDRAW -->
<div class="card">
<h2>Withdraw</h2>
<input type="number" id="withdrawAmount" placeholder="Enter Coins">
<input type="text" id="withdrawAccount" placeholder="Easypaisa / JazzCash Number">
<button onclick="withdraw()">Withdraw Now</button>
<div class="history" id="withdrawHistory"></div>
</div>

<!-- INVESTMENT -->
<div class="card">
<h2>Investment Plans</h2>
<select id="investAmount">
<option value="1000">1000</option>
<option value="5000">5000</option>
<option value="10000">10000</option>
<option value="20000">20000</option>
<option value="50000">50000</option>
</select>
<select id="investPlan">
<option value="10">10% Return</option>
<option value="25">25% Return</option>
<option value="50">50% Return</option>
</select>
<button onclick="invest()">Invest Now</button>
<div class="history" id="investHistory"></div>
</div>

</div>

<div class="contact">Contact Us: <b>03491441853</b></div>
<footer>© 2026 F JIND Trade | Professional Investment & Gaming Platform</footer>
<a class="whatsapp" href="https://wa.me/923491441853" target="_blank">WhatsApp</a>

<script>
let balance=0, teenTimer, wingoTimer;
let cardImages=["Aaa.jpg","Alll.jpg","Ammm.jpg"];
let winningList=[];
function updateBalance(){document.getElementById("balance").innerText=balance;}
function recharge(){let coins=parseInt(document.getElementById("rechargeAmount").value);if(!coins||coins<1000){alert("Minimum 1000 Coins");return;}let price=(coins/1000)*3200;document.getElementById("rechargeHistory").innerHTML+="<p class='orange'>Pending Approval: "+coins+" Coins ("+price+" Rs)</p>";window.open("https://wa.me/923491441853?text=Recharge%20Request%0ACoins:"+coins+"%0AAmount:"+price+"Rs","_blank");}
function invest(){let amount=parseInt(document.getElementById("investAmount").value);let percent=parseInt(document.getElementById("investPlan").value);if(amount>balance){alert("Not enough coins");return;}balance-=amount;let profit=Math.floor(amount*percent/100);balance+=amount+profit;updateBalance();document.getElementById("investHistory").innerHTML+="<p class='green'>Invest "+amount+" → Profit "+profit+"</p>";}

// TEEN PATTI
function startGame(){
let bet=parseInt(document.getElementById("betAmount").value);if(!bet||bet<100||bet>5000){alert("Bet 100-5000");return;}if(bet>balance){alert("Not enough coins");return;}
balance-=bet;updateBalance();document.getElementById("betDisplay").innerText="Your Bet: "+bet+" Coins";document.getElementById("gameResult").innerText="";
resetCards();
let timeLeft=15;document.getElementById("timer").innerText="Timer: "+timeLeft;
clearInterval(teenTimer);
teenTimer=setInterval(()=>{
timeLeft--;
document.getElementById("timer").innerText="Timer: "+timeLeft;
if(timeLeft<=0){clearInterval(teenTimer);revealCards(bet);}
},1000);
}
function resetCards(){for(let i=1;i<=3;i++){let c=document.getElementById("card"+i);c.innerText="?";c.style.backgroundImage="";}}
function revealCards(bet){
for(let i=1;i<=3;i++){document.getElementById("card"+i).style.backgroundImage="url('"+cardImages[i-1]+"')";document.getElementById("card"+i).innerText="";}
let win=Math.random()>0.5;let winAmount=win?bet*2:0;
if(win){balance+=winAmount;document.getElementById("gameResult").innerHTML="<span class='green'>You Won "+winAmount+" Coins</span>";}
else{document.getElementById("gameResult").innerHTML="<span class='red'>You Lost "+bet+" Coins</span>";}
if(winAmount>=100){winningList.unshift("YS won "+winAmount+" Coins");if(winningList.length>10)winningList.pop();document.getElementById("winningTicker").innerHTML=winningList.join(" | ");}
updateBalance();
}

// WINGO
const wingoBoard=document.getElementById("wingoBoard");let userSelection=[];
function createWingoBoard(){
wingoBoard.innerHTML="";
for(let i=1;i<=25;i++){
let cell=document.createElement("div");cell.className="wingo-cell";cell.innerText=i;
cell.style.color="hsl("+(i*30%360)+",100%,70%)";
cell.onclick=function(){if(userSelection.includes(i)){userSelection=userSelection.filter(x=>x!==i);cell.classList.remove("selected");}else{if(userSelection.length<6){userSelection.push(i);cell.classList.add("selected");}}}
wingoBoard.appendChild(cell);}
}
createWingoBoard();

function playWingo(){
let bet=parseInt(document.getElementById("wingoBet").value);if(!bet||bet<100||bet>5000){alert("Bet 100-5000");return;}if(bet>balance){alert("Not enough coins");return;}if(userSelection.length!==6){alert("Select 6 numbers");return;}
balance-=bet;updateBalance();
document.getElementById("wingoBetDisplay").innerText="Your Bet: "+bet+" Coins";document.getElementById("wingoResult").innerText="";
let timeLeft=15;document.getElementById("wingoTimerDisplay").innerText="Timer: "+timeLeft;
clearInterval(wingoTimer);
wingoTimer=setInterval(()=>{
timeLeft--;document.getElementById("wingoTimerDisplay").innerText="Timer: "+timeLeft;
if(timeLeft<=0){clearInterval(wingoTimer);revealWingo(bet);}
},1000);
}
function revealWingo(bet){
let drawNumbers=[]; while(drawNumbers.length<6){let num=Math.floor(Math.random()*25)+1;if(!drawNumbers.includes(num)) drawNumbers.push(num);}
let matches=userSelection.filter(x=>drawNumbers.includes(x));
document.querySelectorAll(".wingo-cell").forEach(cell=>{cell.classList.remove("matched");let val=parseInt(cell.innerText);if(matches.includes(val)) cell.classList.add("matched");});
let winAmount=matches.length*bet;
if(winAmount>0){balance+=winAmount;document.getElementById("wingoResult").innerHTML="<span class='green'>Matched "+matches.length+" → Won "+winAmount+" Coins</span>";}
else{document.getElementById("wingoResult").innerHTML="<span class='red'>No Matches → Lost "+bet+" Coins</span>";}
if(winAmount>=100){winningList.unshift("YS-Wingo won "+winAmount+" Coins");if(winningList.length>10)winningList.pop();document.getElementById("winningTicker").innerHTML=winningList.join(" | ");}
updateBalance();userSelection=[];createWingoBoard();
}

// WITHDRAW
function withdraw(){let amount=parseInt(document.getElementById("withdrawAmount").value);let acc=document.getElementById("withdrawAccount").value;if(amount>balance){alert("Not enough coins");return;}if(acc==""){alert("Enter account");return;}balance-=amount;updateBalance();document.getElementById("withdrawHistory").innerHTML+="<p class='red'>Withdraw "+amount+" → "+acc+"</p>";}

// SIMULATE
const simNames=["User123","PlayerX","AceGamer","CardKing","Lucky77"];
function simulateGame(){let simText="";for(let i=0;i<5;i++){let result=Math.random()>0.5?"won":"lost";let coins=Math.floor(Math.random()*500+100);let user=simNames[Math.floor(Math.random()*simNames.length)];simText+=user+" "+result+" "+coins+" Coins<br>";if(result==="won" && coins>=100){winningList.unshift(user+" won "+coins+" Coins");if(winningList.length>10)winningList.pop();document.getElementById("winningTicker").innerHTML=winningList.join(" | ");}}document.getElementById("simDisplay").innerHTML=simText;setTimeout(simulateGame,3000);}
simulateGame();
</script>
</body>
  </html>
