<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MR FOJI Investment</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,Arial;}
body, html{
    height:100%;
    overflow-x:hidden;
    color:white;
    background-image:url('investment.jpg');
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;
}
@media(max-width:768px){body{background-attachment:scroll;}}

/* BLOCKED APP SCREEN */
#blockedApp{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100vh;
    background: rgba(0,0,0,0.7);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:99999;
}

.blocked-box{
    background: rgba(0,0,0,0.9);
    padding:40px;
    border-radius:15px;
    text-align:center;
    border:2px solid red;
    box-shadow:0 0 20px red;
}

.blocked-box h1{
    color:red;
    font-size:32px;
    margin-bottom:10px;
}

.blocked-box p{
    color:#ccc;
}

/* NAVIGATION AND OTHER CONTENT (background only, not interactive) */
nav{
    display:flex;justify-content:space-between;align-items:center;padding:15px 30px;
    background:#111827;
    border-radius:10px;
    margin:10px;
    box-shadow:0 10px 30px rgba(0,0,0,0.5), 0 0 15px #22c55e inset;
}
nav h1{color:#22c55e;font-size:28px;}
.coins{
    font-weight:bold;font-size:18px;color:#fff;
    padding:8px 18px;border-radius:50px;background: rgba(0,0,0,0.6);
}

/* HERO */
.hero{text-align:center;padding:40px;}
.hero h2{font-size:38px;}
.hero p{color:#9ca3af;}
</style>

<script>
window.onload=function(){
    // Disable all interactions
    document.body.style.pointerEvents = "none";

    // Allow blocked screen interactions (just in case)
    document.getElementById("blockedApp").style.pointerEvents = "auto";
};
</script>
</head>
<body>

<!-- BLOCKED APP -->
<div id="blockedApp">
    <div class="blocked-box">
        <h1>🚫 BLOCKED APP</h1>
        <p>This application is currently disabled</p>
    </div>
</div>

<!-- WEBSITE CONTENT (background only) -->
<nav>
<h1>MR FOJI</h1>
<div class="coins">0</div>
</nav>

<div class="hero">
<h2>Professional Investment Platform</h2>
<p>Fast • Secure • Professional</p>
</div>

</body>
</html>
