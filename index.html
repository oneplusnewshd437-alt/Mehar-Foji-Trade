<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F JIND Trade</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{
background:linear-gradient(135deg,#000,#111,#1a1a1a);
color:white;
min-height:100vh;
overflow-x:hidden;
}

/* HEADER */
.header{
width:100%;
border-bottom:3px solid gold;
background:black;
text-align:center;
}
.header img{
width:100%;
max-height:180px;
object-fit:cover;
}

/* BALANCE */
.balance-box{
text-align:center;
padding:12px;
background:#111;
font-size:16px;
border-bottom:1px solid #222;
}
.balance-box span{
color:#00ff88;
font-weight:bold;
font-size:18px;
}

/* WIN TICKER */
.win-ticker{
background:#8b0000;
color:white;
font-size:12px;
padding:6px;
overflow:hidden;
white-space:nowrap;
}
.win-ticker span{
display:inline-block;
padding-left:100%;
animation:scroll 15s linear infinite;
}
@keyframes scroll{
0%{transform:translateX(0);}
100%{transform:translateX(-100%);}
}

/* CONTAINER */
.container{
max-width:1000px;
margin:auto;
padding:20px 15px 100px;
}

/* CARD BOX */
.card{
background:#161616;
padding:20px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.7);
margin-bottom:20px;
border:1px solid #222;
}
.card h2{
color:gold;
margin-bottom:15px;
text-align:center;
}

/* INPUTS */
input,select{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
background:#222;
color:white;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:gold;
color:black;
font-weight:bold;
cursor:pointer;
margin-top:10px;
transition:0.3s;
}
button:hover{background:orange;}

.history{
background:#111;
padding:10px;
border-radius:8px;
font-size:13px;
max-height:120px;
overflow:auto;
margin-top:10px;
}

.green{color:#00ff88;}
.red{color:#ff4d4d;}

/* GAME AREA */
.game-area{
position:relative;
background:url('F jind.jpg') no-repeat center/cover;
height:420px;
border-radius:15px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
box-shadow:0 0 20px rgba(255,215,0,0.3);
}

.cards{
display:flex;
gap:15px;
}

.card3d{
width:95px;
height:140px;
border-radius:12px;
background:#222;
background-size:cover;
background-position:center;
box-shadow:0 10px 20px rgba(0,0,0,0.8);
transition:0.6s;
}

.flip{
transform:rotateY(360deg);
}

.timer{
margin-top:10px;
font-size:18px;
color:#00ff88;
}

.result{
margin-top:10px;
font-weight:bold;
font-size:18px;
}

/* CONTACT */
.contact{
text-align:center;
padding:15px;
background:#111;
color:#00ff88;
font-weight:bold;
}

/* FOOTER */
footer{
text-align:center;
padding:15px;
background:black;
color:#888;
}

/* WHATSAPP BUTTON */
.whatsapp{
position:fixed;
right:15px;
bottom:20px;
background:#25D366;
color:white;
padding:12px 18px;
border-radius:50px;
font-size:14px;
text-decoration:none;
box-shadow:0 5px 15px rgba(0,0,0,0.5);
}
</style>
</head>
<body>

<div class="header">
<img src="./Alig.jpg">
</div>

<div class="balance-box">
Balance: <span id="balance">1000</span> Coins
</div>

<div class="win-ticker" id="winTicker"></div>

<div class="container">

<div class="card">
<h2>Teen Patti Game</h2>
<input type="number" id="betAmount" placeholder="Bet 100 - 5000">
<div class="game-area">
<div class="cards">
<div class="card3d" id="card1"></div>
<div class="card3d" id="card2"></div>
<div class="card3d" id="card3"></div>
</div>
<div class="timer" id="timer">Timer: 15</div>
<div class="result" id="gameResult"></div>
</div>
<button onclick="startGame()">Start Game</button>
</div>

</div>

<div class="contact">
Ys
</div>

<footer>
© 2026 F JIND Trade
</footer>

<!-- WhatsApp Button -->
<a class="whatsapp" href="https://wa.me/923491441853" target="_blank">
WhatsApp
</a>

<script>

let balance=1000;
let timer;
let timeLeft=15;
const cardImages=["Aaa.jpg","Alll.jpg","Ammm.jpg"];

function updateBalance(){
document.getElementById("balance").innerText=balance;
}

function startGame(){

let bet=parseInt(document.getElementById("betAmount").value);

if(!bet || bet<100 || bet>5000){
alert("Bet 100-5000");
return;
}

if(bet>balance){
alert("Not enough coins");
return;
}

balance-=bet;
updateBalance();

timeLeft=15;
document.getElementById("timer").innerText="Timer: "+timeLeft;
document.getElementById("gameResult").innerText="";

clearInterval(timer);

timer=setInterval(()=>{
timeLeft--;
document.getElementById("timer").innerText="Timer: "+timeLeft;
if(timeLeft<=0){
clearInterval(timer);
revealCards(bet);
}
},1000);
}

function revealCards(bet){

for(let i=1;i<=3;i++){
let card=document.getElementById("card"+i);
card.classList.add("flip");
card.style.backgroundImage="url('"+cardImages[i-1]+"')";
}

let win=Math.random()>0.5;

if(win){
let winAmount=bet*2;
balance+=winAmount;
document.getElementById("gameResult").innerHTML=
"<span class='green'>You Won "+winAmount+" Coins 🎉</span>";
addTicker("Player won "+winAmount+" Coins");
}else{
document.getElementById("gameResult").innerHTML=
"<span class='red'>You Lost "+bet+" Coins</span>";
}

updateBalance();
}

function addTicker(text){
let ticker=document.getElementById("winTicker");
ticker.innerHTML="<span>"+text+"</span>";
}

</script>

</body>
  </html>
