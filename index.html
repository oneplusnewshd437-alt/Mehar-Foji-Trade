<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MR FOJI Investment</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,Arial;
}

body,html{
height:100%;
color:white;
background-image:url('./investment.jpg');
background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;
}

/* LOGIN */

#loginBox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

.login-box{
background:#111827;
padding:25px;
border-radius:10px;
width:300px;
text-align:center;
}

.login-box input{
width:100%;
padding:10px;
margin:10px 0;
border:none;
border-radius:6px;
}

.login-box button{
width:100%;
padding:10px;
background:#22c55e;
border:none;
color:white;
border-radius:6px;
margin-top:10px;
cursor:pointer;
}

/* NAV */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
background:#111827;
border-radius:10px;
margin:10px;
}

nav h1{
color:#22c55e;
font-size:28px;
}

.coins{
font-weight:bold;
font-size:18px;
padding:8px 18px;
border-radius:50px;
background:black;
}

.coins img{
width:25px;
vertical-align:middle;
margin-right:5px;
}

/* NEWS */

.news{
background:red;
padding:10px;
overflow:hidden;
white-space:nowrap;
border-radius:8px;
margin:10px;
}

.news span{
display:inline-block;
padding-left:100%;
animation:slide 30s linear infinite;
}

@keyframes slide{
0%{transform:translateX(0);}
100%{transform:translateX(-100%);}
}

/* HERO */

.hero{
text-align:center;
padding:40px;
}

.hero h2{
font-size:38px;
}

/* TASK */

.task{
background:#111827;
margin:20px auto;
padding:20px;
border-radius:12px;
text-align:center;
width:90%;
max-width:400px;
}

.task button{
margin-top:10px;
padding:10px 25px;
background:#22c55e;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

/* STATS */

.stats{
display:flex;
justify-content:center;
padding:20px;
}

.stat{
background:#111827;
padding:20px;
border-radius:12px;
text-align:center;
}

.stat h3{
color:#22c55e;
font-size:28px;
}

/* EVENT */

.event{
text-align:center;
padding:30px;
}

.event-img{
width:100%;
max-width:350px;
border-radius:15px;
}

.event-button{
display:inline-block;
background:#22c55e;
color:white;
padding:12px 25px;
border-radius:8px;
text-decoration:none;
margin-top:10px;
}

/* PLANS */

.plans{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
padding:20px;
}

.plan{
padding:20px;
width:260px;
border-radius:15px;
color:white;
}

.plan.basic{background:#1e3c72;}
.plan.silver{background:#c0c0c0;color:black;}
.plan.gold{background:#ffd700;color:black;}
.plan.vip{background:#ff4d4d;}

.plan button{
padding:10px;
background:#22c55e;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

/* DEPOSIT BOX */

.box{
background:#111827;
padding:25px;
border-radius:10px;
max-width:400px;
margin:20px auto;
}

.box input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:none;
background:#1f2937;
color:white;
}

.box button{
width:100%;
padding:12px;
background:#25D366;
border:none;
border-radius:8px;
color:white;
}

/* 3D CALCULATOR */

.calc-3d{
text-align:center;
margin:40px auto;
perspective:1200px;
}

.calc-card{

background:linear-gradient(145deg,#1e3a8a,#6d28d9);

padding:35px;

border-radius:25px;

width:90%;
max-width:420px;

margin:auto;

transform-style:preserve-3d;

transition:0.4s;

box-shadow:0 15px 40px rgba(0,0,0,0.7);
}

.calc-card:hover{

transform:rotateX(8deg) rotateY(8deg);

box-shadow:0 25px 60px rgba(0,0,0,0.9);
}

.calc-card input{

width:100%;

padding:16px;

border:none;

border-radius:12px;

margin-bottom:15px;

font-size:18px;

background:#0f172a;

color:white;
}

.calc-card button{

width:100%;

padding:16px;

border:none;

border-radius:12px;

font-size:18px;

font-weight:bold;

color:white;

background:linear-gradient(90deg,#06b6d4,#9333ea);

cursor:pointer;
}

/* ONLINE USERS 3D */

.computer-users{

text-align:center;

margin:30px auto;

padding:30px;

background:linear-gradient(145deg,#f97316,#dc2626);

border-radius:20px;

max-width:420px;

transition:0.4s;

box-shadow:0 15px 40px rgba(0,0,0,0.7);
}

.computer-users:hover{

transform:rotateX(6deg) rotateY(-6deg);

box-shadow:0 25px 60px rgba(0,0,0,0.9);
}

.computer-users h2{

font-size:30px;

color:white;
}

/* FOOTER */

footer{
background:#020617;
padding:20px;
text-align:center;
margin-top:20px;
}

/* WHATSAPP */

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:14px 18px;
border-radius:50px;
color:white;
text-decoration:none;
}

</style>

<script>

/* LOGIN */

function loginUser(){

var m=document.getElementById("mobile").value;

var p=document.getElementById("pass").value;

if(!localStorage.getItem("userMobile")){

localStorage.setItem("userMobile",m);

localStorage.setItem("userPass",p);

localStorage.setItem("coins",120);

alert("Account Created");

location.reload();

}

else{

if(m===localStorage.getItem("userMobile") && p===localStorage.getItem("userPass")){

document.getElementById("loginBox").style.display="none";

}

else{

alert("Wrong Details");

}

}

}

/* COINS */

function loadCoins(){

document.getElementById("coins").innerHTML='<img src="Coine1.jpg">'+(localStorage.getItem("coins")||0);

}

/* DAILY REWARD */

function claimReward(){

var last=localStorage.getItem("lastClaim");

var now=new Date().getTime();

if(!last || now-last>86400000){

localStorage.setItem("lastClaim",now);

var coins=parseInt(localStorage.getItem("coins")||0)+10;

localStorage.setItem("coins",coins);

alert("10 Coins Added");

loadCoins();

}

else{

alert("Already claimed today");

}

}

/* PROFIT */

var profit=110000;

setInterval(()=>{

profit+=Math.floor(Math.random()*200);

document.getElementById("profit").innerHTML=profit+" PKR";

},3000);

/* CALCULATOR */

function calculateProfit(){

var invest=parseFloat(document.getElementById("investment").value)||0;

var profit=invest*0.25;

var total=invest+profit;

document.getElementById("calcResult").innerText=

"Profit: "+profit+" PKR | Total: "+total+" PKR";

}

/* ONLINE USERS */

function simulateOnlineUsers(){

setInterval(()=>{

var online=Math.floor(Math.random()*45)+10;

document.getElementById("onlineUsers").innerText=online+" Users Online";

},3000);

}

window.onload=function(){

loadCoins();

simulateOnlineUsers();

};

</script>

</head>

<body>

<div id="loginBox">

<div class="login-box">

<h2 style="color:#22c55e;">Login</h2>

<input id="mobile" placeholder="Mobile">

<input id="pass" type="password" placeholder="Password">

<button onclick="loginUser()">Login</button>

</div>

</div>

<nav>

<h1>MR FOJI</h1>

<div class="coins" id="coins">0</div>

</nav>

<div class="hero">

<h2>Professional Investment Platform</h2>

</div>

<div class="task">

<h3>Daily Login Reward</h3>

<button onclick="claimReward()">Claim Reward</button>

</div>

<div class="stats">

<div class="stat">

<h3 id="profit">210000</h3>

<p>Live Profit</p>

</div>

</div>

<section class="calc-3d">

<h2>Profit Calculator</h2>

<div class="calc-card">

<input id="investment" placeholder="Enter Investment">

<button onclick="calculateProfit()">Calculate</button>

<p id="calcResult">Profit: 0 PKR | Total: 0 PKR</p>

</div>

</section>

<div class="computer-users">

<h2 id="onlineUsers">0 Users Online</h2>

</div>

<footer>

© MR FOJI Investment

</footer>

<a href="https://wa.me/923491441853" class="whatsapp">WhatsApp</a>

</body>
    </html>
