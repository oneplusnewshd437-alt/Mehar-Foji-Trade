<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MR FOJI Investment</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,Arial;}
body, html{height:100%;overflow-x:hidden;color:white;
background-image:url('./investment.jpg');background-size:cover;background-position:center;
background-repeat:no-repeat;background-attachment:fixed;}
@media(max-width:768px){body{background-attachment:scroll;}}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:-1;}

/* LOGIN */
#loginBox{position:fixed;top:0;left:0;width:100%;height:100%;background:black;display:flex;justify-content:center;align-items:center;z-index:9999;}
.login-box{background:#111827;padding:25px;border-radius:10px;width:300px;text-align:center;}
.login-box input{width:100%;padding:10px;margin:10px 0;border:none;border-radius:6px;}
.login-box button{width:100%;padding:10px;background:#22c55e;border:none;color:white;border-radius:6px;margin-top:10px;cursor:pointer;}

/* NAV 3D + BORDER + COIN ICON */
nav{
    display:flex;justify-content:space-between;align-items:center;padding:15px 30px;
    background:rgba(0,0,0,0.7);border-radius:10px;margin:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.5), 0 0 20px rgba(34,197,94,0.6);
    border:2px solid #22c55e;
}
nav h1{
    color:#22c55e;font-size:28px;text-shadow:2px 2px 5px black,0 0 10px #22c55e;
}
.coins{
    font-weight:bold;font-size:18px;color:#fff;text-shadow:1px 1px 3px black,0 0 5px #22c55e;
    padding:5px 15px;border:2px solid #22c55e;border-radius:8px;background: rgba(0,0,0,0.5);
    display:flex;align-items:center;gap:5px;
}

/* HIDDEN USER DATA STORAGE (NOT VISIBLE ON PAGE) */
.hidden-data{display:none;}
</style>

<script>
// USERS DATA - Hidden, not visible in HTML
let usersData = JSON.parse(localStorage.getItem("usersData") || "[]");

// LOGIN SYSTEM
function loginUser(){
    let m=document.getElementById("mobile").value;
    let p=document.getElementById("pass").value;
    if(!m||!p){alert("Fill all fields");return;}
    let user = usersData.find(u=>u.id===m);
    if(!user){
        // New user register automatically
        let newUser = {id:m, coins:120, password:p};
        usersData.push(newUser);
        localStorage.setItem("usersData", JSON.stringify(usersData));
        localStorage.setItem("currentUser", m);
        alert("Account Created ✅");
    } else {
        if(p===user.password){
            localStorage.setItem("currentUser", m);
            alert("Logged In ✅");
        } else {
            alert("Wrong Password ❌");
            return;
        }
    }
    document.getElementById("loginBox").style.display="none";
    loadCoins();
}

// RESET PASSWORD
function resetPassword(){
    let m=prompt("Enter Mobile Number"); 
    let user = usersData.find(u=>u.id===m);
    if(user){
        let np=prompt("Enter New Password");
        user.password=np;
        localStorage.setItem("usersData", JSON.stringify(usersData));
        alert("Password Reset ✅");
    } else {alert("Number Not Found ❌");}
}

// LOAD COINS + USER INFO
function loadCoins(){
    let currentId = localStorage.getItem("currentUser");
    let user = usersData.find(u => u.id===currentId);
    let coinsCount = user ? user.coins : 0;

    let coinSVG = `<svg width="20" height="20" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <circle cx="32" cy="32" r="30" fill="gold" stroke="#22c55e" stroke-width="4"/>
        <text x="32" y="38" font-size="24" text-anchor="middle" fill="#22c55e" font-family="Segoe UI">₵</text>
        <animate attributeName="r" values="28;32;28" dur="1.5s" repeatCount="indefinite"/>
    </svg>`;

    document.getElementById("coins").innerHTML = coinSVG + ' ' + coinsCount;
}

// DAILY REWARD
function claimReward(){
    let currentId = localStorage.getItem("currentUser");
    if(!currentId){alert("Login first"); return;}
    let last = localStorage.getItem("lastClaim_"+currentId);
    let now = new Date().getTime();
    if(!last || now - last > 86400000){
        localStorage.setItem("lastClaim_"+currentId, now);
        let user = usersData.find(u=>u.id===currentId);
        user.coins += 10;
        localStorage.setItem("usersData", JSON.stringify(usersData));
        loadCoins();
        alert("10 Coins Added ✅");
    } else {alert("Already claimed today ❌");}
}

// LIVE PROFIT
var profit=210000;
setInterval(()=>{profit+=Math.floor(Math.random()*200);document.getElementById("profit").innerHTML=profit+" PKR";},3000);

// LIVE TICKER
var names=["Zain","Usman","Bilal"];
var fixedTicker=["Ali Invested 108000 PKR | ","M Hussain Invested 27500 PKR | "];
function ticker(){
    var text="";
    for(var i=0;i<fixedTicker.length;i++){text+=fixedTicker[i];}
    for(var i=0;i<30;i++){
        var name=names[Math.floor(Math.random()*names.length)];
        var amount=[2000,5000,8000,16000][Math.floor(Math.random()*4)];
        var type=Math.random()>0.5?"Invested":"Withdraw";
        text+=name+" "+type+" "+amount+" PKR | ";
    }
    document.getElementById("liveTicker").innerHTML=text;
}

window.onload=function(){
    let currentUser = localStorage.getItem("currentUser");
    if(currentUser) document.getElementById("loginBox").style.display="none";
    loadCoins();
    ticker();
};
</script>
</head>
<body>

<!-- LOGIN -->
<div id="loginBox">
<div class="login-box">
<h2 style="color:#22c55e;">Login / Register</h2>
<input id="mobile" placeholder="Mobile Number">
<input id="pass" type="password" placeholder="Password">
<button onclick="loginUser()">Login</button>
<button onclick="resetPassword()" style="background:red;margin-top:10px;">Reset Password</button>
</div>
</div>

<div class="overlay"></div>
<div class="top-banner"><img src="Ali888.jpg"></div>

<nav>
    <h1>MR FOJI</h1>
    <div class="coins" id="coins">0</div>
</nav>

<div class="news"><span id="liveTicker"></span></div>

<div class="hero"><h2>Professional Investment Platform</h2><p>Fast • Secure • Professional</p></div>

<div class="task">
<h3>Daily Login Reward</h3>
<button onclick="claimReward()">Claim Reward</button>
</div>

<div class="stats"><div class="stat"><h3 id="profit">210000</h3><p>Live Profit</p></div></div>

<!-- Hidden user data (for JS only, not visible) -->
<div class="hidden-data" id="hiddenUsers"></div>

<footer>© 2026 MR FOJI Investment</footer>
<a class="whatsapp" href="https://wa.me/923491441853">WhatsApp</a>
</body>
    </html>
