<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F JIND Trade</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{background:linear-gradient(135deg,#000,#111,#1c1c1c);color:white;min-height:100vh;}

/* HEADER */
.header{text-align:center;padding:10px;background:black;box-shadow:0 5px 20px rgba(0,0,0,0.6);}
.header img{max-width:100%;height:auto;border-radius:12px;}

/* BALANCE */
.balance-box{text-align:center;padding:12px;background:#111;font-size:15px;border-bottom:1px solid #222;}
.balance-box span{color:#00ff88;font-weight:bold;font-size:16px;}

/* CONTAINER */
.container{max-width:1100px;margin:auto;padding:30px 15px 100px;display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:20px;}

/* CARD */
.card{background:#161616;border-radius:15px;padding:20px;box-shadow:0 10px 30px rgba(0,0,0,0.7);transition:0.3s;border:1px solid #222;}
.card:hover{transform:translateY(-5px);border:1px solid gold;}
.card h2{margin-bottom:15px;color:gold;}
input,select{width:100%;padding:12px;margin:10px 0;border:none;border-radius:8px;background:#222;color:white;font-size:14px;}
button{width:100%;padding:12px;margin-top:10px;border:none;border-radius:8px;font-weight:bold;cursor:pointer;background:gold;color:black;transition:0.3s;}
button:hover{background:orange;}
.history{margin-top:10px;max-height:120px;overflow:auto;background:#111;padding:8px;border-radius:8px;font-size:13px;}
.green{color:#00ff88;}
.red{color:#ff4d4d;}

/* CONTACT */
.contact{text-align:center;padding:15px;background:#111;color:#00ff88;font-size:15px;}
footer{text-align:center;padding:15px;font-size:12px;color:#888;background:black;}

/* BOTTOM MENU */
.bottom-menu{position:fixed;bottom:0;width:100%;background:black;display:flex;justify-content:space-around;padding:15px 0;border-top:2px solid gold;}
.bottom-menu div{color:white;font-size:14px;cursor:pointer;}
.bottom-menu div:hover{color:gold;}

/* WHATSAPP BUTTON */
.whatsapp{position:fixed;right:15px;bottom:80px;background:#25D366;color:white;padding:12px 15px;border-radius:50px;font-size:14px;text-decoration:none;box-shadow:0 5px 15px rgba(0,0,0,0.5);}

/* GAME */
.game-area{text-align:center;}
.cards{display:flex;justify-content:center;gap:15px;margin:20px 0;}
.card3d{width:80px;height:120px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:bold;box-shadow:0 10px 20px rgba(0,0,0,0.8);transform-style:preserve-3d;transition:0.5s;background:#222;color:white;font-size:24px;}
.card3d.show{transform:rotateY(360deg);}
.timer{font-size:18px;color:#00ff88;margin-top:10px;}
.result{margin-top:15px;font-size:16px;font-weight:bold;}
</style>
</head>

<body>

<!-- HEADER IMAGE -->
<div class="header">
<img src=".file_000000006a1c7209aad997e59e16ade7~2.jpg" alt="F JIND Trade Logo">
</div>

<div class="balance-box">
Balance: <span id="balance">0</span> Coins
</div>

<div class="container">

<!-- RECHARGE -->
<div class="card">
<h2>Recharge Coins</h2>
<p style="color:#00ff88;">EasyPaisa Wallet: <b>03220751486</b></p>
<select id="rechargeCoins" onchange="calculatePrice()"></select>
<p>Price: Rs <span id="price">0</span></p>
<input type="file" id="paymentShot" accept="image/*">
<button onclick="recharge()">Submit Payment</button>
<div class="history" id="rechargeHistory"></div>
</div>

<!-- INVEST -->
<div class="card">
<h2>Investment</h2>
<select id="investAmount"></select>
<select id="investPlan">
<option value="10">10% Return</option>
<option value="25">25% Return</option>
<option value="50">50% Return</option>
</select>
<button onclick="invest()">Invest Now</button>
<div class="history" id="investHistory"></div>
</div>

<!-- WITHDRAW -->
<div class="card">
<h2>Withdraw</h2>
<input type="number" id="withdrawAmount" placeholder="Enter coins">
<input type="text" id="withdrawAccount" placeholder="Easypaisa / JazzCash Number">
<button onclick="withdraw()">Request Withdraw</button>
<div class="history" id="withdrawHistory"></div>
</div>

<!-- GAME -->
<div class="card">
<h2>Teen Patti Game</h2>
<div class="game-area">
<select id="betAmount">
<option value="100">100 Coins</option>
<option value="500">500 Coins</option>
<option value="1000">1000 Coins</option>
<option value="2000">2000 Coins</option>
<option value="5000">5000 Coins</option>
</select>
<button onclick="startGame()">Start Game</button>
<div class="timer" id="timer">Timer: 15</div>
<div class="cards">
<div class="card3d" id="card1">?</div>
<div class="card3d" id="card2">?</div>
<div class="card3d" id="card3">?</div>
</div>
<div class="result" id="gameResult"></div>
</div>
</div>

</div>

<div class="contact">
Contact Us: <b>03491441853</b>
</div>

<footer>© 2026 F JIND Trade | Professional Investment System</footer>

<div class="bottom-menu">
<div>🏠 Home</div>
<div>📊 Menu</div>
</div>

<a class="whatsapp" href="https://wa.me/923491441853" target="_blank">WhatsApp</a>

<script>
let balance=0;
const rechargeSelect=document.getElementById("rechargeCoins");
const investSelect=document.getElementById("investAmount");

for(let i=10000;i<=50000;i+=10000){
let opt=document.createElement("option");
opt.value=i;
opt.text=i.toLocaleString()+" Coins";
rechargeSelect.appendChild(opt);
}
for(let i=1000;i<=200000;i+=5000){
let opt=document.createElement("option");
opt.value=i;
opt.text=i.toLocaleString()+" Coins";
investSelect.appendChild(opt);
}

function calculatePrice(){
let coins=parseInt(rechargeSelect.value);
let rate=3260/10000;
document.getElementById("price").innerText=Math.floor(coins*rate);
}
function recharge(){let file=document.getElementById("paymentShot").files[0];if(!file){alert("Upload Screenshot");return;}alert("Recharge Request Submitted - Admin Approval Required");}
function invest(){let amount=parseInt(investSelect.value);let percent=parseInt(document.getElementById("investPlan").value);if(amount>balance){alert("Not enough coins");return;}balance-=amount;let profit=Math.floor(amount*percent/100);balance+=amount+profit;document.getElementById("balance").innerText=balance;document.getElementById("investHistory").innerHTML+=`<p class="green">Invested ${amount} → Profit ${profit}</p>`;}
function withdraw(){let amount=parseInt(document.getElementById("withdrawAmount").value);let account=document.getElementById("withdrawAccount").value;if(amount>balance){alert("Not enough coins");return;}if(account===""){alert("Enter account number");return;}balance-=amount;document.getElementById("balance").innerText=balance;document.getElementById("withdrawHistory").innerHTML+=`<p class="red">Withdraw ${amount} → ${account}</p>`;}
calculatePrice();

/* GAME LOGIC */
let gameTimer;let timeLeft=15;
const cardValues=["A","K","Q","J","10"]; // self-generated

function startGame(){
let bet=parseInt(document.getElementById("betAmount").value);
if(bet>balance){alert("Not enough coins");return;}
balance-=bet;
document.getElementById("balance").innerText=balance;
timeLeft=15;document.getElementById("timer").innerText="Timer: "+timeLeft;
document.getElementById("gameResult").innerText="";
document.getElementById("card1").innerText="?";document.getElementById("card2").innerText="?";document.getElementById("card3").innerText="?";
document.getElementById("card1").classList.remove("show");document.getElementById("card2").classList.remove("show");document.getElementById("card3").classList.remove("show");
clearInterval(gameTimer);
gameTimer=setInterval(()=>{
timeLeft--;document.getElementById("timer").innerText="Timer: "+timeLeft;
if(timeLeft<=0){clearInterval(gameTimer);revealCards(bet);}
},1000);
}

function revealCards(bet){
let c1=cardValues[Math.floor(Math.random()*cardValues.length)];
let c2=cardValues[Math.floor(Math.random()*cardValues.length)];
let c3=cardValues[Math.floor(Math.random()*cardValues.length)];
document.getElementById("card1").innerText=c1;
document.getElementById("card2").innerText=c2;
document.getElementById("card3").innerText=c3;
document.getElementById("card1").classList.add("show");document.getElementById("card2").classList.add("show");document.getElementById("card3").classList.add("show");

if(c1===c2 || c2===c3 || c1===c3){
let win=bet*2;balance+=win;document.getElementById("balance").innerText=balance;
document.getElementById("gameResult").innerHTML=`<span class="green">You Won ${win} Coins!</span>`;
}else{
document.getElementById("gameResult").innerHTML=`<span class="red">You Lost ${bet} Coins</span>`;
}
}
</script>

</body>
  </html>
