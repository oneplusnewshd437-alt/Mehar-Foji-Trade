<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>MR FOJI Investment</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,Arial;}
body{background:#020617;color:white;}

/* BANNER */
.top-banner img{width:100%;height:auto;object-fit:contain;}

/* NAVBAR */
nav{display:flex;justify-content:space-between;align-items:center;padding:15px 30px;background:#020617;border-bottom:1px solid #1f2937;}
nav h1{color:#22c55e;}
nav .coins{color:#fff;font-weight:bold;}

/* HERO */
.hero{text-align:center;padding:40px;background:radial-gradient(circle,#0f172a,#020617);}
.hero h2{font-size:38px;margin-bottom:10px;}
.hero p{color:#9ca3af;}

/* DAILY TASK */
.task{background:#111827;margin:20px auto;padding:20px;border-radius:12px;text-align:center;width:90%;max-width:400px;border:1px solid #22c55e;}
.task button{margin-top:10px;padding:10px 25px;background:#22c55e;border:none;color:white;border-radius:6px;cursor:pointer;}

/* STATS */
.stats{display:flex;justify-content:space-around;flex-wrap:wrap;padding:20px;}
.stat{text-align:center;margin:10px;}
.stat h3{color:#22c55e;font-size:28px;}

/* EVENT */
.event{text-align:center;padding:30px;}
.event-img{width:250px;height:250px;object-fit:cover;border-radius:12px;box-shadow:0 10px 25px rgba(0,0,0,0.5);}

/* PLANS */
.plans{display:flex;flex-wrap:wrap;justify-content:center;gap:25px;padding:20px;}
.plan{background:#111827;padding:20px;width:260px;border-radius:12px;transition:.3s;}
.plan:hover{transform:translateY(-10px);}
.plan.vip{border:2px solid #22c55e;box-shadow:0 0 20px rgba(34,197,94,0.6);}
.plan button{margin-top:10px;padding:10px;background:#22c55e;border:none;color:white;border-radius:5px;cursor:pointer;}

/* FOOTER */
footer{background:#020617;padding:20px;text-align:center;color:#aaa;margin-top:20px;}

/* WHATSAPP */
.whatsapp{position:fixed;bottom:20px;right:20px;background:#25D366;padding:14px 18px;border-radius:50px;color:white;text-decoration:none;box-shadow:0 5px 15px rgba(0,0,0,0.4);}
</style>

<script>
// INVEST BUTTON
function invest(plan){
  window.open("https://wa.me/923491441853?text="+plan);
}

// DAILY COINS SYSTEM
function claimReward(){
  var last=localStorage.getItem("lastClaim");
  var now=new Date().getTime();
  if(!last || now - last > 86400000){
    localStorage.setItem("lastClaim",now);
    var coins=localStorage.getItem("coins")||0;
    coins=parseInt(coins)+10;
    localStorage.setItem("coins",coins);
    document.getElementById("coins").innerHTML=coins;
    alert("10 Coins Added ✅");
  }else{
    alert("You already claimed reward today ❌");
  }
}

function loadCoins(){
  var coins=localStorage.getItem("coins")||0;
  document.getElementById("coins").innerHTML=coins;
}

// AUTO PROFIT
var profit=210000;
setInterval(()=>{
  profit+=Math.floor(Math.random()*200);
  document.getElementById("profit").innerHTML=profit+" PKR";
},3000);

// FAKE LIVE USERS
var names=["Ali","Usman","Bilal","Zain","Rizwan"];
setInterval(()=>{
  var n=names[Math.floor(Math.random()*names.length)];
  var a=[8000,12000,16000,32000,50000][Math.floor(Math.random()*5)];
  document.getElementById("liveUser").innerHTML=n+" invested "+a+" PKR";
},2000);

window.onload=loadCoins;
</script>

</head>

<div class="stats">

</div>

<div class="event">

<section class="plans">

  </div>
  <div class="plan">

  <div class="plan">
